# open-virtual-switch-agent Configure Options
# Derived from the cellular-manager configure_options.conf layout
# and the open-virtual-switch-agent S3 artifact flags in Downloads/flags.txt.
#
# Note:
# - This file is consumed by the current native build flow as CPPFLAGS/CFLAGS/LDFLAGS.
# - The build script does not pass configure command-line switches.
# - If `CORE_NET_LIB_FEATURE_SUPPORT` must also be enabled in `configure.ac`,
#   that needs to be handled separately from this file.

# ============================================================================
# CPPFLAGS - Preprocessor flags (includes and defines)
# ============================================================================
[CPPFLAGS]
# Autotools configuration
-DHAVE_CONFIG_H

# Include paths
-I$HOME/usr/include/rdkb/
-I$HOME/usr/include/rdkb/ccsp/
-I$HOME/usr/include/rdkb/syscfg/
-I$HOME/usr/include/rdkb/sysevent/
-I/usr/include/dbus-1.0
-I/usr/lib/x86_64-linux-gnu/dbus-1.0/include

# Component include paths
-I$(top_srcdir)/source
-I$(top_srcdir)/source/include

# Core system defines
-DFEATURE_SUPPORT_RDKLOG
-D_COSA_HAL_
-U_COSA_SIM_
-DCONFIG_SYSTEM_MOCA

# ANSC framework defines
-D_ANSC_LINUX
-D_ANSC_USER
-D_ANSC_LITTLE_ENDIAN_
-D_ANSC_USE_OPENSSL_
-D_ANSC_AES_USED_
-D_NO_ANSC_ZLIB_
-U_ANSC_IPV6_COMPATIBLE_

# CCSP / component defines
-D_CCSP_CWMP_TCP_CONNREQ_HANDLER
-D_DSLH_STUN_
-D_NO_PKI_KB5_SUPPORT
-D_BBHM_SSE_FILE_IO
-DCCSP_SUPPORT_ENABLED

# Platform / product defines
-D_COSA_INTEL_USG_ARM_
-D_COSA_FOR_COMCAST_
-D_XB6_PRODUCT_REQ_
-D_COSA_BCM_ARM_
-D_XB7_PRODUCT_REQ_
-DETH_4_PORTS
-D_2_5G_ETHERNET_SUPPORT_
-D_MACSEC_SUPPORT_

# Security / debugging
-DENABLE_SA_KEY
-D_NO_EXECINFO_H_
-D_DEBUG
-DINCLUDE_BREAKPAD

# System features
-DFEATURE_SUPPORT_SYSLOG
-DBUILD_WEB
-DUSE_NOTIFY_COMPONENT
-DNTPD_ENABLE
-DUTC_ENABLE
-DXDNS_ENABLE
-DUTC_ENABLE_ATOM

# Network / MoCA / WAN features
-DMOCA_HOME_ISOLATION
-D_ENABLE_BAND_STEERING_
-D_BEACONRATE_SUPPORT
-DMOCA_DIAGONISTIC
-DENABLE_ETH_WAN
-DEROUTER_DHCP_OPTION_MTA
-DCOLUMBO_HWTEST
-D_BRIDGE_UTILS_BIN_
-DAUTOWAN_ENABLE
-DENABLE_WANMODECHANGE_NOREBOOT
-DWAN_FAILOVER_SUPPORTED
-DGATEWAY_FAILOVER_SUPPORTED
-DFEATURE_RDKB_CONFIGURABLE_WAN_INTERFACE
-DWAN_MANAGER_UNIFICATION_ENABLED
-DMAPT_UNIFICATION_ENABLED
-DAMENITIES_NETWORK_ENABLED

# WiFi / RDKB features
-D_PSM_TRANS_RDK_TRIGG_
-D_WIFI_AX_SUPPORT_
-D_WIFI_CONSOLIDATED_STANDARDS_
-DWIFI_HAL_VERSION_3
-DFEATURE_SUPPORT_MESH
-DFEATURE_SUPPORT_WEBCONFIG
-DFEATURE_SUPPORT_INTERWORKING
-DFEATURE_SUPPORT_PASSPOINT
-DWIFI_STATS_DISABLE_SPEEDTEST_RUNNING
-DFEATURE_SUPPORT_RADIUSGREYLIST
-DFEATURE_SUPPORT_ACL_SELFHEAL
-DFEATURE_CSI
-DFEATURE_SUPPORT_ONBOARD_LOGGING
-DFEATURE_RDKB_WAN_MANAGER
-DFEATURE_SUPPORT_WIFIDB
-DFEATURE_OFF_CHANNEL_SCAN_5G
-DFEATURE_RDKB_INTER_DEVICE_MANAGER
-DFEATURE_SUPPORT_MAPT_NAT46
-DRBUS_BUILD_FLAG_ENABLE
-DRDK_ONEWIFI
-DFEATURE_RDKB_DHCP_MANAGER
-DWIFI_MANAGE_SUPPORTED
-DSPEED_BOOST_SUPPORTED
-DCORE_NET_LIB

# ============================================================================
# CFLAGS - Compiler flags
# ============================================================================
[CFLAGS]
-fno-exceptions
-ffunction-sections
-fdata-sections
-fomit-frame-pointer
-fno-strict-aliasing

# ============================================================================
# LDFLAGS - Linker flags
# ============================================================================
[LDFLAGS]
-L$HOME/usr/local/lib
-L$HOME/usr/local/lib/x86_64-linux-gnu
-L$HOME/usr/lib
-L/usr/lib/x86_64-linux-gnu
-Wl,-rpath,$HOME/usr/local/lib/x86_64-linux-gnu
-Wl,-rpath-link,$HOME/usr/local/lib
-Wl,--allow-shlib-undefined
-Wl,--unresolved-symbols=ignore-all
-Wl,--no-as-needed
-Wl,--as-needed
-Wl,--hash-style=gnu
-Wl,-O1

